name: ML Workflow CI

on:
  push:
    branches: [main]
    paths:
      - 'MLProject/**'
  workflow_dispatch: {}

permissions:
  contents: write

env:
  MLFLOW_EXPERIMENT_NAME: "Diabetes_Prediction_CI"
  IMAGE_NAME: "diabetes-risk-model"

jobs:
  train-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MLflow & dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas==2.2.2 numpy==1.26.4 scikit-learn==1.5.2 joblib==1.4.2

      - name: Run MLflow Project (retraining)
        working-directory: MLProject
        run: |
          mlflow run . --experiment-name "$MLFLOW_EXPERIMENT_NAME" --env-manager=local

      - name: Get latest MLflow run ID
        working-directory: MLProject
        run: |
          RUN_ID=$(python -c "
          import mlflow
          client = mlflow.tracking.MlflowClient()
          exp = client.get_experiment_by_name('$MLFLOW_EXPERIMENT_NAME')
          runs = client.search_runs(exp.experiment_id, order_by=['start_time DESC'], max_results=1)
          print(runs[0].info.run_id)
          ")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run id: $RUN_ID"

      # --- Skilled: simpan artefak model & mlruns ke repo GitHub yang sama ---
      - name: Upload MLflow artifacts as GitHub Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            MLProject/mlruns
            MLProject/model_output

      - name: Commit mlruns back to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add MLProject/mlruns MLProject/model_output || true
          git diff --staged --quiet || git commit -m "chore: update MLflow run artifacts [CI]"
          git push origin HEAD:main

      # --- Advance: build & push Docker image ke Docker Hub (Dockerfile custom) ---
      - name: Copy model & scaler for Docker build context
        working-directory: MLProject
        run: |
          cp model_output/model.joblib .
          cp diabetes_preprocessing/scaler.joblib .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: MLProject
          file: MLProject/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
